services:
  mongo:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      PORT: "2024"
      ALLOW_INSECURE_DEFAULTS: "true"
      JWT_SECRET: "dev-secret-change-before-production"
      BASE_URL: "http://localhost:2024"
      MONGO_URI: "mongodb://mongo:27017"
      MONGO_DB_NAME: "mcp_marketplace"
      MONGO_REQUIRED: "true"
      N8N_BASE_URL: "http://n8n:5678"
      N8N_API_KEY: "${N8N_API_KEY:-}"
      N8N_TIMEOUT_SECONDS: "12"
      SUPER_ADMIN_EMAIL: "admin@platform.local"
      SUPER_ADMIN_PASSWORD: "ChangeMe123!dev"
    ports:
      - "2024:2024"
    depends_on:
      - mongo

  webapp:
    build:
      context: ..
      dockerfile: webapp/Dockerfile
    environment:
      API_BASE_URL: "http://backend:2024"
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:2024"
      NEXT_PUBLIC_N8N_URL: "http://localhost:5678"
    ports:
      - "3000:3000"
    depends_on:
      - backend

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: "localhost"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "http"
      WEBHOOK_URL: "http://localhost:5678/"
      GENERIC_TIMEZONE: "America/Los_Angeles"
    volumes:
      - n8n-data:/home/node/.n8n

volumes:
  mongo-data:
  n8n-data:
