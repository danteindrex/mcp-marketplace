version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: "8080"
      JWT_SECRET: "dev-secret"
      BASE_URL: "http://localhost:8080"
    ports:
      - "8080:8080"

  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8080"
    ports:
      - "3000:3000"
    depends_on:
      - backend