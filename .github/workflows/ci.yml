name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Test backend
        working-directory: backend
        run: |
          go test ./...
          go vet ./...
          go build ./...

  webapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build webapp
        working-directory: webapp
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run build
